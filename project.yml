name: WorkoutTimer

options:
  bundleIdPrefix: eu.wolfgangkluth
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "16.0"
  developmentLanguage: en

settings:
  base:
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  WorkoutTimerWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - WorkoutTimerWatch
    info:
      path: WorkoutTimerWatch/Resources/Info.plist
      properties:
        CFBundleDisplayName: WorkoutTimer
        WKApplication: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        WKWatchOnly: true
        WKBackgroundModes:
          - self-care
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: eu.wolfgangkluth.workouttimer
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: 4
      GENERATE_INFOPLIST_FILE: NO

  WorkoutTimerWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - WorkoutTimerWatchTests
    dependencies:
      - target: WorkoutTimerWatch
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: eu.wolfgangkluth.workouttimer.tests
      CODE_SIGN_STYLE: Automatic
      TARGETED_DEVICE_FAMILY: 4
      GENERATE_INFOPLIST_FILE: YES

schemes:
  WorkoutTimer:
    build:
      targets:
        WorkoutTimerWatch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WorkoutTimerWatchTests
    archive:
      config: Release
