name: WorkoutTimer

options:
  bundleIdPrefix: eu.wolfgangkluth
  deploymentTarget:
    watchOS: "10.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: en
  knownRegions: [en, de]

settings:
  base:
    DEVELOPMENT_TEAM: 
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:
  WorkoutTimerWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - Shared
      - WorkoutTimerWatch
    info:
      path: WorkoutTimerWatch/Resources/Info.plist
      properties:
        CFBundleDisplayName: WorkoutTimer
        WKApplication: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        WKWatchOnly: true
        WKBackgroundModes:
          - self-care
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: eu.wolfgangkluth.workouttimer
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: 4
      GENERATE_INFOPLIST_FILE: NO

  WorkoutTimerWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - WorkoutTimerWatchTests
    dependencies:
      - target: WorkoutTimerWatch
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: eu.wolfgangkluth.workouttimer.tests
      CODE_SIGN_STYLE: Automatic
      TARGETED_DEVICE_FAMILY: 4
      GENERATE_INFOPLIST_FILE: YES

  WorkoutTimeriOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Shared
      - WorkoutTimeriOS
    info:
      path: WorkoutTimeriOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: WorkoutTimer
        UIBackgroundModes:
          - audio
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: eu.wolfgangkluth.workouttimer.ios
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: "1,2"
      GENERATE_INFOPLIST_FILE: NO

  WorkoutTimeriOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - WorkoutTimeriOSTests
    dependencies:
      - target: WorkoutTimeriOS
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: eu.wolfgangkluth.workouttimer.ios.tests
      CODE_SIGN_STYLE: Automatic
      TARGETED_DEVICE_FAMILY: "1,2"
      GENERATE_INFOPLIST_FILE: YES

schemes:
  WorkoutTimerWatch:
    build:
      targets:
        WorkoutTimerWatch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WorkoutTimerWatchTests
    archive:
      config: Release

  WorkoutTimeriOS:
    build:
      targets:
        WorkoutTimeriOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WorkoutTimeriOSTests
    archive:
      config: Release
