name: Tests

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-ios:
    name: iOS Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run iOS tests
        run: |
          xcodebuild test \
            -scheme WorkoutTimeriOS \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults-iOS.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO | xcpretty && exit ${PIPESTATUS[0]}

  test-watchos:
    name: watchOS Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run watchOS tests
        run: |
          xcodebuild test \
            -scheme WorkoutTimerWatch \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 10 (46mm)' \
            -resultBundlePath TestResults-watchOS.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO | xcpretty && exit ${PIPESTATUS[0]}
